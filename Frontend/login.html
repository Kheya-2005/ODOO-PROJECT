<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODOO - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-3xl shadow-xl text-5xl mb-4">🧑‍💼</div>
            <h1 class="text-5xl font-bold text-white tracking-tight">ODOO</h1>
            <p class="text-white/90">Every workday, perfectly aligned.</p>
        </div>

        <div class="glass rounded-3xl shadow-2xl p-10">
            <h2 class="text-3xl font-semibold text-center text-gray-800 mb-8">Sign In</h2>

            <form onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Login ID / Email</label>
                    <input type="text" id="loginId" 
                           class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:outline-none focus:border-purple-500 transition-colors"
                           placeholder="Enter Employee ID or Email" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <div class="relative">
                        <input type="password" id="password" 
                               class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:outline-none focus:border-purple-500 transition-colors"
                               placeholder="Enter Password" required>
                        <button type="button" onclick="togglePassword()" 
                                class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            👁️
                        </button>
                    </div>
                </div>

                <button type="submit" id="loginBtn"
                        class="w-full py-4 bg-gradient-to-r from-purple-600 to-violet-600 text-white font-semibold rounded-2xl hover:from-purple-700 hover:to-violet-700 transition-all text-lg">
                    SIGN IN
                </button>
            </form>

            <div class="text-center mt-8">
                <p class="text-gray-600">
                    Don't have an account? 
                    <a href="signup.html" class="text-purple-600 hover:underline font-medium">Sign Up</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        }

        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = 'Signing In...';
            btn.disabled = true;

            setTimeout(() => {
                alert("✅ Login Successful! Welcome to ODOO");
                window.location.href = "index.html";
            }, 1500);
        }
    </script>
</body>
</html>
